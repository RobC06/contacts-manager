<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <button id="close-btn" title="Close">&times;</button>
      <h2>Time Tracker</h2>
      <div id="header-stats">Today: 0.00h</div>
    </div>

    <!-- Entry Form -->
    <div id="form-section">
      <div class="form-group">
        <input type="date" id="date-input">
      </div>
      <div class="form-group">
        <input type="text" id="client-input" placeholder="Client">
      </div>
      <div class="form-row">
        <input type="number" id="time-input" step="0.25" placeholder="Hours">
        <input type="text" id="task-input" placeholder="Task">
      </div>
      <div class="form-actions">
        <button id="submit-btn">Add Entry</button>
        <button id="cancel-btn" style="display: none;">Cancel</button>
      </div>
    </div>

    <!-- View Toggle -->
    <div id="view-toggle">
      <span id="entries-label">Today's Entries</span>
      <div class="toggle-buttons">
        <button id="expand-btn" title="Open full site">&#8599;</button>
        <button id="toggle-btn">View All</button>
      </div>
    </div>

    <!-- Entries List -->
    <div id="entries-list"></div>

    <!-- Status Bar -->
    <div id="status-bar">
      <span id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
