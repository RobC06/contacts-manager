<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Details - Contact Outreach Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-nav">
        <a href="index.html" class="back-link">← Back to Contacts</a>
      </div>
      <h1 id="contactNameTitle">Contact Details</h1>
      <div class="header-actions">
        <button id="deleteContactBtn" class="btn btn-danger">Delete Contact</button>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </header>

    <div class="contact-detail">
      <div class="detail-section">
        <h2>Contact Information</h2>
        <form id="contactForm">
          <div class="form-row">
            <div class="form-group">
              <label for="contactName">Name *</label>
              <input type="text" id="contactName" required>
            </div>
            <div class="form-group">
              <label for="contactCompany">Company</label>
              <input type="text" id="contactCompany">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="contactTitle">Title</label>
              <input type="text" id="contactTitle">
            </div>
            <div class="form-group">
              <label for="contactEmail">Email</label>
              <input type="email" id="contactEmail">
            </div>
          </div>
          <div class="form-row date-comments-row">
            <div class="form-group date-field-width last-contact-red">
              <label>Date of Last Contact</label>
              <input type="text" id="lastContactDate" readonly>
            </div>
            <div class="form-group comments-field-width">
              <label for="contactComments">Comments</label>
              <textarea id="contactComments" rows="1" placeholder="General comments about this contact..."></textarea>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group highlight-field narrow-width">
              <label for="contactTag">Tag</label>
              <select id="contactTag">
                <option value="no action">No Action</option>
                <option value="follow up">Follow Up</option>
                <option value="waiting for response">Waiting for Response</option>
              </select>
            </div>
          </div>
          <div class="form-row three-column-row">
            <div class="form-group highlight-field date-field-width">
              <label for="contactFollowUpDate">Follow-up Date</label>
              <input type="date" id="contactFollowUpDate">
            </div>
            <div class="form-group highlight-field notes-field-width-expanded">
              <label for="contactFollowUpNotes">Follow-up Notes</label>
              <textarea id="contactFollowUpNotes" rows="3" placeholder="Notes for the follow-up..."></textarea>
            </div>
            <div class="form-group highlight-field date-field-width">
              <label>
                <input type="checkbox" id="sendFollowUpEmail">
                Follow-up email
              </label>
              <label for="emailSendDate" style="margin-top: 12px; display: block;">Email Send Date</label>
              <input type="date" id="emailSendDate">
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>

      <div class="detail-section">
        <div class="section-header">
          <h2>Communication History</h2>
          <div class="section-actions">
            <button id="addCommunicationBtn" class="btn btn-primary btn-sm">Add Communication</button>
            <button id="deleteSelectedCommsBtn" class="btn btn-danger btn-sm" style="display: none;">Delete Selected</button>
          </div>
        </div>

        <div id="communicationSelectionBar" style="display: none; margin-bottom: 12px;">
          <label style="font-size: 14px;">
            <input type="checkbox" id="selectAllCommsCheckbox">
            Select All
          </label>
        </div>

        <div id="communicationsContainer">
          <!-- Communications will be loaded here -->
        </div>

        <div id="noCommunications" style="display: none;">
          <p class="empty-message">No communications recorded yet.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Communication Modal -->
  <div id="communicationModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Communication</h2>
        <span class="close">&times;</span>
      </div>
      <form id="communicationForm">
        <div class="form-group">
          <label for="commType">Type *</label>
          <select id="commType" required>
            <option value="email">Email</option>
            <option value="phone">Phone Call</option>
            <option value="meeting">Meeting</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="commDate">Date *</label>
          <input type="date" id="commDate" required>
        </div>
        <div class="form-group">
          <label for="commDescription">Description *</label>
          <textarea id="commDescription" rows="4" required placeholder="Brief description of the communication..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelCommBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Communication</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="contact.js"></script>
</body>
</html>
